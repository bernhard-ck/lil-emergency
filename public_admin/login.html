<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Emergency Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-panel {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div style="position: absolute; top: 1rem; right: 1rem;">
            <select id="lang-toggle" class="btn outline-btn" onchange="changeLang(this.value)" style="padding: 0.5rem;">
                <option value="en">English</option>
                <option value="nl">Nederlands</option>
            </select>
        </div>
        <div class="panel login-panel">
            <h2 style="border-bottom: none; margin-bottom: 0.5rem;" data-i18n="login_title">Admin Login</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.875rem;" data-i18n="login_desc">Enter password to access the command center</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="password" id="password" required placeholder="Enter password..." autofocus style="text-align: center;">
                </div>
                <div id="error-msg" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;" data-i18n="invalid_pass">Invalid password</div>
                <button type="submit" class="btn btn-primary" data-i18n="unlock">Unlock</button>
            </form>
        </div>
    </div>
    <script>
        const i18n = {
            en: {
                login_title: "Admin Login",
                login_desc: "Enter password to access the command center",
                pass_ph: "Enter password...",
                invalid_pass: "Invalid password",
                unlock: "Unlock"
            },
            nl: {
                login_title: "Beheerders Inloggen",
                login_desc: "Voer uw wachtwoord in om toegang te krijgen",
                pass_ph: "Wachtwoord invoeren...",
                invalid_pass: "Ongeldig wachtwoord",
                unlock: "Ontgrendelen"
            }
        };

        function changeLang(lang) {
            localStorage.setItem('lang', lang);
            document.getElementById('lang-toggle').value = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            document.getElementById('password').placeholder = i18n[lang].pass_ph;
        }

        const savedLang = localStorage.getItem('lang') || 'en';
        changeLang(savedLang);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
