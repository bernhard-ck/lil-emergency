version: '3.8'
services:
  emergency-display:
    build: .
    container_name: emergency-display
    env_file:
      - .env
    ports:
      - "${SCREEN_PORT:-80}:${SCREEN_PORT:-80}"
      - "${ADMIN_PORT:-8080}:${ADMIN_PORT:-8080}"
    volumes:
      - ./data:/usr/src/app/data
      - ./uploads:/usr/src/app/uploads
    restart: unless-stopped
